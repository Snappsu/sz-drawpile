version: '3.3'
services:
    drawpile-srv:
        container_name: drawpile-server
        image: drawpile/drawpile-srv:${DP_VERSION:-2.3}
        command:
            --sessions /home/drawpile/sessions
            --database /home/drawpile/config.db
            --templates /var/session-templates
            --web-admin-port 27780
            --web-admin-access all
            --local-host ${DOMAIN}
            --report-url http://abusereport:8080/
            --websocket-port 27751
            --extauth https://api.snapples64.workers.dev/drawpile/login
        restart: always
        ports:
            - "27750:27750"
            - "27751:27751"
        volumes:
            - ./server-data:/home/drawpile/
            - ./session-templates:/var/session-templates
        networks:
            dpserver:
                ipv4_address: 172.18.0.2

    listserver:
        container_name: drawpile-listserver
        image: drawpile/listserver:${LISTSERVER_VERSION:-1}
        command:
            -c /srv/listserver.cfg
        volumes:
            - ./server-data:/srv
        restart: always
        networks:
            dpserver:
                ipv4_address: 172.18.0.3
        environment:
            LS_INCLUDESERVERS: http://drawpile-srv:27780/api
            LS_DATABASE: none
            LS_NAME: ${DOMAIN}
            LS_PROXYHEADERS: "true"

    abusereport:
        container_name: drawpile-abusereport
        image: drawpile/abusereport:${ABUSEREPORT_VERSION:-1}
        restart: always
        networks:
            dpserver:
                ipv4_address: 172.18.0.5
        environment:
            SERVER_HOST: ${DOMAIN}
            DISCORD_WEBHOOK: ${DISCORD_WEBHOOK}

    nginx:
        container_name: drawpile-nginx
        build:
            context: ./setup/nginx
            args:
                - DOMAIN
                - EMAIL
        environment:
            DOMAIN: ${DOMAIN:-dp.sniddy.zone}
            EMAIL: ${EMAIL}
            USE_CERTBOT: ${USE_CERTBOT:-no}
            SITE_GIT: ${SITE_GIT:-https://github.com/Snappsu/sz-drawpile.git}
            SITE_GIT_BRANCH: ${-main}
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - ./web-server/certs:/etc/certbot
            - ./web-server/site:/var/www/public_html
            - ./web-server/nginx-config:/etc/nginx/conf.d
        networks:
            dpserver:
              ipv4_address: 172.18.0.4

networks:
    dpserver:
      ipam:
        driver: default
        config:
          - subnet: 172.18.0.0/16
            gateway: 172.18.0.1
